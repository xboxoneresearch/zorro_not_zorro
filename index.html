<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zorro A0 or not Zorro A0</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header>
      <h1>Zorro A0 or not Zorro A0</h1>
    </header>

    <main>
      <section class="tile" id="drop-area">
        <input type="file" id="file-input" />
        <div class="tile-inner">
          <div class="upload-prompt">
            <p><strong>Choose a file</strong> or drag it here</p>
            <button id="choose-btn" class="btn">Choose file</button>
          </div>
          <div id="result" class="result">
            <div id="overlay" class="overlay hidden"></div>
            <div id="spinner" class="loader hidden" aria-hidden="true"></div>
            <img id="success-img" src="/success.png" alt="Success" class="overlay-img hidden" />
            <img id="fail-img" src="/not_success.png" alt="Failure" class="overlay-img hidden" />
          </div>
          <div id="message" class="message"></div>
        </div>
      </section>

      <section id="log" class="log"></section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
