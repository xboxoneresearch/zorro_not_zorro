<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zorro A0 checker</title>
    <script type="module" crossorigin src="/zorro_not_zorro/assets/index-DaS9twKu.js"></script>
    <link rel="stylesheet" crossorigin href="/zorro_not_zorro/assets/index-BY1bqgzG.css">
  </head>
  <body>
    <header>
      <h1>Zorro A0 Checker</h1>
    </header>

    <main>
      <section class="tile" id="drop-area">
        <input type="file" id="file-input" />
        <div class="tile-inner">
          <div class="upload-prompt">
            <p><strong>Choose a file</strong> or drag it here</p>
            <p>Accepts <strong>full nand dump</strong> or bare <strong>sp_s.cfg</strong></p>
            <button id="choose-btn" class="btn">Choose file</button>
          </div>
          <div id="result" class="result">
            <div id="overlay" class="overlay hidden"></div>
            <div id="spinner" class="loader hidden" aria-hidden="true"></div>
            <img id="success-img" src="/zorro_not_zorro/assets/success-DAqdS1LH.png" alt="Success" class="overlay-img hidden" />
            <img id="fail-img" src="/zorro_not_zorro/assets/not_success-BAJl60zf.png" alt="Failure" class="overlay-img hidden" />
          </div>
          <div id="message" class="message"></div>
        </div>
      </section>

      <section id="log" class="log"></section>
    </main>

  </body>
</html>
